  <style>
    /* Channel picker modal — self-contained copy so this page works in its iframe */
    .cfg-cp-overlay {
      position: fixed; inset: 0; z-index: 2000;
      display: flex; align-items: center; justify-content: center;
    }
    .cfg-cp-backdrop {
      position: absolute; inset: 0; background: rgba(0,0,0,.55);
    }
    .cfg-cp-panel {
      position: relative; z-index: 1;
      background: var(--color-panel, #1a1a2e);
      border: 1px solid var(--color-border, #3a3a55);
      border-radius: 10px; width: 300px; max-height: 65vh;
      display: flex; flex-direction: column;
      box-shadow: 0 8px 32px rgba(0,0,0,.5);
    }
    .cfg-cp-header {
      padding: 10px 12px 10px 16px; font-weight: 600; font-size: .9rem;
      border-bottom: 1px solid var(--color-border,#333); flex-shrink: 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .cfg-cp-refresh {
      background: none; border: none; cursor: pointer;
      color: var(--color-text-muted); padding: 2px 6px;
      border-radius: 4px; font-size: .9rem; opacity: .65;
    }
    .cfg-cp-refresh:hover { opacity: 1; }
    .cfg-cp-refresh:disabled { opacity: .35; cursor: default; }
    .cfg-cp-spinning { animation: cfg-spin .9s linear infinite; }
    @keyframes cfg-spin { to { transform: rotate(360deg); } }
    .cfg-cp-all {
      padding: 10px 16px 8px;
      border-bottom: 1px solid var(--color-border,#2a2a40); flex-shrink: 0;
    }
    .cfg-cp-all label {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; font-size: .85rem;
      color: var(--color-text,#ccc); user-select: none;
    }
    .cfg-cp-list { overflow-y: auto; flex: 1; padding: 6px 0; }
    .cfg-cp-item {
      display: flex; align-items: center; gap: 8px;
      padding: 6px 16px; cursor: pointer;
      font-size: .85rem; color: var(--color-text-muted,#999);
      transition: background .1s;
    }
    .cfg-cp-item:hover { background: var(--color-background-hover,rgba(255,255,255,.05)); }
    .cfg-cp-disabled { opacity: .4; cursor: default; pointer-events: none; }
    .cfg-cp-footer {
      display: flex; justify-content: flex-end; gap: 8px;
      padding: 10px 16px;
      border-top: 1px solid var(--color-border,#333); flex-shrink: 0;
    }
    .cfg-ch-btn {
      font-size: 12px; padding: 5px 12px;
    }
    .nav {
      display: flex;
      padding-left: 0;
      margin: 0 0 1rem 0;
      list-style: none;
      border-bottom: 1px solid var(--color-border);
      gap: 0.25rem;
    }
    .nav-link {
      font-family: "Rubik", Arial, Helvetica, sans-serif;
      border: 1px solid transparent;
      border-top-left-radius: 4px;
      border-top-right-radius: 4px;
      padding: 0.4rem 0.7rem;
      background: transparent;
      color: var(--color-text-secondary);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }
    .nav-link.active {
      color: var(--color-text-primary);
      border-color: var(--color-border);
      border-bottom-color: transparent;
      background: var(--color-background);

<!-- ── Inline channel-picker store (self-contained for this iframe) ──────── -->
<script>
  function _registerCfgPicker() {
    Alpine.store('cfgPicker', {
      open: false, title: '', allChannels: true,
      channels: [], saving: false, refreshing: false,
      _onSave: null, _onRefresh: null,

      show(opts) {
        this.title      = opts.title || 'Watched Channels';
        this._onSave    = opts.onSave;
        this._onRefresh = opts.onRefresh;
        var watched = opts.watchedIds || [];
        this.allChannels = watched.length === 0;
        this._apply(opts.channels || [], new Set(watched));
        this.open = true;
      },
      close() { this.open = false; },
      toggle(id) {
        var ch = this.channels.find(function(c){ return c.id === id; });
        if (ch) ch.selected = !ch.selected;
      },
      async save() {
        if (!this._onSave || this.saving) return;
        var ids = this.allChannels
          ? []
          : this.channels.filter(function(c){ return c.selected; }).map(function(c){ return c.id; });
        this.saving = true;
        try {
          await this._onSave(ids);
          this.open = false;
        } catch(e) {
          // leave open; caller shows its own error
        } finally {
          this.saving = false;
        }
      },
      async refresh() {
        if (!this._onRefresh || this.refreshing) return;
        this.refreshing = true;
        try {
          var updated = await this._onRefresh();
          if (Array.isArray(updated)) {
            var draft = new Set(this.channels.filter(function(c){ return c.selected; }).map(function(c){ return c.id; }));
            this._apply(updated, draft.size ? draft : null);
          }
        } finally {
          this.refreshing = false;
        }
      },
      _apply(list, selectedIds) {
        this.channels = list.map(function(ch) {
          return Object.assign({}, ch, {
            selected: selectedIds === null || selectedIds.has(ch.id),
          });
        });
      },
    });
  }
  if (globalThis.Alpine) _registerCfgPicker();
  else document.addEventListener('alpine:init', _registerCfgPicker);

  // Summary text for watched_channels (array or comma-string)
  window._chSummary = function(val) {
    var ids = Array.isArray(val)
      ? val.filter(Boolean)
      : (val || '').split(',').map(function(s){ return s.trim(); }).filter(Boolean);
    if (!ids.length) return 'All channels';
    return ids.length + ' channel' + (ids.length === 1 ? '' : 's') + ' selected';
  };
</script>

<!-- ── Picker logic ────────────────────────────────────────────────────────── -->
<script type="module">
import { callJsonApi } from "/js/api.js";

const _PLATFORMS = {
  revolt:  { channelsUrl: 'channels',         updateUrl: 'update_channels',         title: 'Revolt Watched Channels',  cfgObj: (c) => c,        },
  discord: { channelsUrl: 'discord_channels',  updateUrl: 'discord_update_channels', title: 'Discord Watched Channels', cfgObj: (c) => c.discord, },
  slack:   { channelsUrl: 'slack_channels',    updateUrl: 'slack_update_channels',   title: 'Slack Watched Channels',   cfgObj: (c) => c.slack,   },
};

window._openWatchedPicker = async function(platform, config, btn) {
  const p        = _PLATFORMS[platform];
  const fieldCtl = btn.closest('.field-control');
  const errEl    = fieldCtl.querySelector('.cfg-ch-error');
  const origText = btn.textContent;

  errEl.style.display = 'none';
  errEl.textContent   = '';
  btn.disabled        = true;
  btn.textContent     = 'Loading…';

  try {
    const data = await callJsonApi(`/plugins/parley/${p.channelsUrl}`);

    if (data.not_configured) {
      const hint = {
        revolt:  'Save your bot token and server ID first.',
        discord: 'Save your bot token and guild ID first.',
        slack:   'Save your bot token first.',
      }[platform];
      throw new Error(`${platform.charAt(0).toUpperCase() + platform.slice(1)} is not configured — ${hint}`);
    }
    if (!data.ok) {
      throw new Error(data.error || `Cannot connect to ${platform} server.`);
    }

    const textChannels = (data.channels || []).filter(c => c.type === 'TextChannel');
    if (!textChannels.length) {
      throw new Error('No text channels found. Check the bot has access to at least one channel.');
    }

    const cfgObj     = p.cfgObj(config);
    const currentVal = cfgObj.watched_channels;
    const watchedIds = Array.isArray(currentVal)
      ? currentVal.filter(Boolean)
      : (currentVal || '').split(',').map(s => s.trim()).filter(Boolean);

    Alpine.store('cfgPicker').show({
      title:    p.title,
      channels: textChannels,
      watchedIds,

      onSave: async (ids) => {
        const res = await callJsonApi(`/plugins/parley/${p.updateUrl}`, { watched_channels: ids });
        if (!res.ok) throw new Error(res.error || 'Save failed');
        // Update reactive config so the x-text summary re-renders
        cfgObj.watched_channels = ids;
      },

      onRefresh: async () => {
        const r = await callJsonApi(`/plugins/parley/${p.channelsUrl}`);
        if (!r.ok) throw new Error(r.error || 'Refresh failed');
        return (r.channels || []).filter(c => c.type === 'TextChannel');
      },
    });

  } catch (e) {
    errEl.textContent   = e.message || String(e);
    errEl.style.display = 'block';
  } finally {
    btn.disabled    = false;
    btn.textContent = origText;
  }
};
</script>

</body>
</html>
